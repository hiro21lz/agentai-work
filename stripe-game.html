<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>しましまゲーム / Stripe Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; touch-action:manipulation; }
  body {
    font-family:'Nunito',sans-serif; background:#fff9f0;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; padding:12px; overflow-x:hidden;
  }
  .header {
    width:100%; max-width:500px;
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:10px;
  }
  .title { font-size:1.4rem; font-weight:900; color:#333; }
  .lang-btn {
    background:#ffe066; border:3px solid #333; border-radius:20px;
    padding:4px 14px; font-family:'Nunito',sans-serif; font-weight:800;
    font-size:0.85rem; cursor:pointer; box-shadow:3px 3px 0 #333;
  }
  .stage-info {
    width:100%; max-width:500px;
    display:flex; justify-content:space-between; align-items:center;
    background:#fff; border:3px solid #333; border-radius:16px;
    padding:8px 16px; margin-bottom:12px; box-shadow:4px 4px 0 #333;
  }
  .stage-label { font-size:1rem; font-weight:800; color:#555; }
  .moves-label { font-size:1rem; font-weight:800; color:#e05c5c; }
  .game-area {
    width:100%; max-width:500px; background:#fff;
    border:3px solid #333; border-radius:20px;
    padding:16px; box-shadow:5px 5px 0 #333; margin-bottom:14px;
  }
  .section-title { font-size:0.85rem; font-weight:800; color:#888; margin-bottom:10px; }
  .color-palette { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:4px; }
  .color-chip {
    width:52px; height:52px; border-radius:12px;
    border:3px solid transparent; cursor:pointer; position:relative;
    transition:transform 0.15s; box-shadow:2px 2px 0 rgba(0,0,0,0.2);
  }
  .color-chip.selected {
    border-color:#333; transform:scale(1.18); box-shadow:3px 3px 0 #333;
  }
  .color-chip .go-badge {
    position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
    background:#333; color:#fff; font-size:0.6rem; font-weight:900;
    padding:1px 5px; border-radius:6px; white-space:nowrap; pointer-events:none;
  }
  .start-btn {
    display:block; width:100%; margin-top:18px; padding:12px;
    background:#66dd88; border:3px solid #333; border-radius:14px;
    font-family:'Nunito',sans-serif; font-size:1.1rem; font-weight:900;
    cursor:pointer; box-shadow:4px 4px 0 #333;
  }
  .start-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .divider { border:none; border-top:2px dashed #eee; margin:14px 0; }
  .play-hint { font-size:0.82rem; font-weight:800; color:#aaa; text-align:center; margin-bottom:8px; }

/* Stripe container */
.stripe-container {
display:flex; flex-direction:column; gap:5px;
margin:8px 0; position:relative;
}
.stripe {
height:50px; border-radius:10px;
border:2px solid rgba(0,0,0,0.2);
cursor:grab; position:relative;
user-select:none; overflow:hidden;
transition:transform 0.1s, box-shadow 0.1s;
}
.stripe.is-placeholder {
opacity:0.2; border:2.5px dashed #aaa;
transform:none !important; box-shadow:none !important;
}
.stripe.drop-target {
transform:scaleY(1.1);
box-shadow:0 0 0 3px #333, 3px 3px 0 #333;
}
.stripe canvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

/* Ghost */
#dragGhost {
position:fixed; width:320px; height:50px;
border-radius:10px; border:3px solid #333;
pointer-events:none; z-index:999; display:none;
box-shadow:8px 8px 20px rgba(0,0,0,0.4);
transform:rotate(-1.5deg) scale(1.05);
overflow:hidden;
}
#dragGhost canvas { position:absolute; inset:0; width:100%; height:100%; }

/* Answer */
.answer-section { display:flex; gap:16px; justify-content:center; margin-top:14px; }
.answer-btn {
width:82px; height:82px; border-radius:50%;
border:4px solid #333; font-size:2.5rem; cursor:pointer;
background:#fff; box-shadow:4px 4px 0 #333;
display:flex; align-items:center; justify-content:center;
transition:transform 0.1s;
}
.answer-btn:active { transform:translate(2px,2px); box-shadow:2px 2px 0 #333; }
.answer-btn.maru { background:#e8f8ff; }
.answer-btn.batsu { background:#fff0f0; }
.answer-hint { text-align:center; font-size:0.8rem; font-weight:700; color:#aaa; margin-top:6px; }

/* Overlay */
.overlay {
position:fixed; inset:0; background:rgba(0,0,0,0.6);
display:flex; align-items:flex-start; justify-content:center;
z-index:200; opacity:0; pointer-events:none;
transition:opacity 0.3s; overflow-y:auto; padding:16px;
}
.overlay.show { opacity:1; pointer-events:all; }
.result-card {
background:#fff; border:4px solid #333; border-radius:24px;
padding:20px 18px 24px; text-align:center; box-shadow:8px 8px 0 #333;
max-width:440px; width:100%;
transform:scale(0.85); transition:transform 0.3s;
margin-top:8px;
}
.overlay.show .result-card { transform:scale(1); }
.character { width:110px; height:110px; margin:0 auto 8px; }
.result-title { font-size:1.7rem; font-weight:900; margin-bottom:4px; }
.result-sub { font-size:0.9rem; color:#666; margin-bottom:6px; font-weight:700; }
.min-moves-label { font-size:0.78rem; color:#aaa; font-weight:700; margin-bottom:12px; }

/* Three previews */
.preview-row { display:flex; gap:8px; justify-content:center; margin-bottom:14px; }
.preview-col { flex:1; max-width:120px; }
.preview-label {
font-size:0.68rem; font-weight:900; color:#999;
text-align:center; margin-bottom:4px; letter-spacing:0.3px;
}
.preview-stripes {
border:2px solid #ddd; border-radius:8px; overflow:hidden;
display:flex; flex-direction:column; gap:2px; padding:3px;
background:#f5f5f5;
}
.preview-stripe {
height:13px; border-radius:3px;
border:1px solid rgba(0,0,0,0.1);
position:relative; overflow:hidden;
}
.preview-stripe canvas { position:absolute; inset:0; width:100%; height:100%; }

.next-btn {
background:#ffe066; border:3px solid #333; border-radius:14px;
padding:10px 28px; font-family:‘Nunito’,sans-serif;
font-size:1rem; font-weight:900; cursor:pointer; box-shadow:4px 4px 0 #333;
}
</style>

</head>
<body>

<!-- Ghost for drag -->

<div id="dragGhost"><canvas id="ghostCanvas" width="320" height="50"></canvas></div>

<div class="header">
  <div class="title" id="mainTitle">🌈 しましまゲーム</div>
  <button class="lang-btn" onclick="toggleLang()">EN/JP</button>
</div>

<div class="stage-info">
  <div class="stage-label" id="stageLabel">ステージ 1</div>
  <div class="moves-label" id="movesLabel">🔄 入換: 0回</div>
</div>

<div class="game-area">
  <div id="phaseSelect">
    <div class="section-title" id="selectHint">2色を選んでね！</div>
    <div class="color-palette" id="palette"></div>
    <button class="start-btn" id="startBtn" onclick="startGame()" disabled>GO! 🎮</button>
  </div>
  <hr class="divider">
  <div id="phasePlay" style="display:none">
    <div class="play-hint" id="playHint">いれかえて、しましまにしよう！</div>
    <div class="stripe-container" id="stripeContainer"></div>
    <hr class="divider">
    <div class="answer-hint" id="answerHint">しましまになった？</div>
    <div class="answer-section">
      <button class="answer-btn maru" onclick="submitAnswer(true)">⭕</button>
      <button class="answer-btn batsu" onclick="submitAnswer(false)">❌</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="result-card">
    <div class="character" id="charSvg"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-sub" id="resultSub"></div>
    <div class="min-moves-label" id="minMovesLabel"></div>
    <div class="preview-row" id="previewRow"></div>
    <button class="next-btn" id="nextBtn" onclick="nextStage()"></button>
  </div>
</div>

<script>
// ===== i18n =====
let lang = 'ja';
const T = {
  ja:{
    mainTitle:'🌈 しましまゲーム',
    stageLabel:s=>`ステージ ${s}`,
    movesLabel:n=>`🔄 入換: ${n}回`,
    selectHint:n=>`${n}色を選んでね！`,
    playHint:'いれかえて、しましまにしよう！',
    answerHint:'しましまになった？',
    correctMaru:'🎉 やったー！',
    correctMaruSub:m=>`${m}回でできたよ！`,
    correctBatsu:'😊 せいかい！',
    correctBatsuSub:'ならべかえてもしましまにならないね',
    wrongMaru:'😢 ざんねん…',
    wrongMaruSub:'ほんとはしましまにできなかったんだよ',
    wrongBatsu:'😢 ざんねん…',
    wrongBatsuSub:'ならべかえるとしましまになるよ！',
    nextStage:'つぎへ →',retry:'もういちど',goBtn:'GO! 🎮',
    minMoves:n=>`さいしょうかいすう: ${n}回`,
    labelInit:'さいしょ',labelAnswer:'こたえ',labelResult:'きみのこたえ',
  },
  en:{
    mainTitle:'🌈 Stripe Game',
    stageLabel:s=>`Stage ${s}`,
    movesLabel:n=>`🔄 Swaps: ${n}`,
    selectHint:n=>`Pick ${n} colors!`,
    playHint:'Swap stripes to alternate!',
    answerHint:'Did you make a pattern?',
    correctMaru:'🎉 Great job!',
    correctMaruSub:m=>`Done in ${m} swap${m!==1?'s':''}!`,
    correctBatsu:'😊 Correct!',
    correctBatsuSub:"It can't be alternating — nice!",
    wrongMaru:'😢 Oops!',
    wrongMaruSub:"It wasn't actually possible",
    wrongBatsu:'😢 Oops!',
    wrongBatsuSub:'You can arrange them to alternate!',
    nextStage:'Next →',retry:'Retry',goBtn:'GO! 🎮',
    minMoves:n=>`Min swaps: ${n}`,
    labelInit:'Initial',labelAnswer:'Answer',labelResult:'Your result',
  }
};
function t(key,...args){const v=T[lang][key];return typeof v==='function'?v(...args):v;}
function toggleLang(){lang=lang==='ja'?'en':'ja';applyLang();}
function applyLang(){
  document.getElementById('mainTitle').textContent=t('mainTitle');
  document.getElementById('stageLabel').textContent=t('stageLabel',stage);
  document.getElementById('movesLabel').textContent=t('movesLabel',moves);
  document.getElementById('selectHint').textContent=t('selectHint',numColors);
  document.getElementById('playHint').textContent=t('playHint');
  document.getElementById('answerHint').textContent=t('answerHint');
  document.getElementById('startBtn').textContent=t('goBtn');
}

// ===== COLORS - vivid, clearly distinct, crayon-like =====
const COLORS = [
  {hex:'#E53935',name:'赤/Red'},
  {hex:'#1E88E5',name:'青/Blue'},
  {hex:'#43A047',name:'緑/Green'},
  {hex:'#FB8C00',name:'橙/Orange'},
  {hex:'#8E24AA',name:'紫/Purple'},
  {hex:'#00ACC1',name:'水/Cyan'},
  {hex:'#E91E8C',name:'桃/Pink'},
  {hex:'#757575',name:'灰/Gray'},
];

// ===== State =====
let stage=1,moves=0,numColors=2,totalStripes=4;
let selectedColors=[],stripes=[],initialStripes=[];
let canBeAlternating=false,lastCorrect=false,minSwaps=0;

function getStageConfig(s){
  return {
    numColors:Math.min(2+Math.floor((s-1)/3),Math.min(4,COLORS.length)),
    totalStripes:Math.min(4+Math.floor((s-1)/2)*2,12)
  };
}

function init(){
  const cfg=getStageConfig(stage);
  numColors=cfg.numColors; totalStripes=cfg.totalStripes;
  moves=0; selectedColors=[]; stripes=[];
  applyLang();
  document.getElementById('phaseSelect').style.display='';
  document.getElementById('phasePlay').style.display='none';
  document.getElementById('overlay').classList.remove('show');
  renderPalette(); updateStartBtn();
}

function renderPalette(){
  const el=document.getElementById('palette');
  el.innerHTML='';
  COLORS.forEach((c,i)=>{
    const chip=document.createElement('div');
    chip.className='color-chip';
    chip.style.background=c.hex;
    chip.title=c.name;
    chip.onclick=()=>toggleColor(i,chip);
    // Draw crayon chip
    el.appendChild(chip);
    requestAnimationFrame(()=>drawChipCrayon(chip,c.hex));
  });
}

function drawChipCrayon(chip,color){
  // overlay canvas on chip for texture
  let cvs=chip.querySelector('canvas');
  if(!cvs){cvs=document.createElement('canvas');cvs.style.cssText='position:absolute;inset:0;width:100%;height:100%;border-radius:9px;pointer-events:none;';chip.style.position='relative';chip.appendChild(cvs);}
  const r=chip.getBoundingClientRect();
  drawCrayonRect(cvs,color,r.width||52,r.height||52);
}

function toggleColor(idx,chip){
  const pos=selectedColors.findIndex(x=>x.idx===idx);
  if(pos>=0){
    selectedColors.splice(pos,1);
    chip.classList.remove('selected');
    const b=chip.querySelector('.go-badge');if(b)b.remove();
  }else{
    if(selectedColors.length>=numColors)return;
    selectedColors.push({idx,color:COLORS[idx].hex});
    chip.classList.add('selected');
    const b=document.createElement('div');b.className='go-badge';b.textContent='GO';chip.appendChild(b);
  }
  updateStartBtn();
}
function updateStartBtn(){document.getElementById('startBtn').disabled=selectedColors.length!==numColors;}
function startGame(){
  document.getElementById('phaseSelect').style.display='none';
  document.getElementById('phasePlay').style.display='';
  stripeListenersAttached=false;
  generateStripes();
}

// ===== Crayon drawing engine =====
function drawCrayonRect(canvas,color,w,h){
  canvas.width=Math.round(w);
  canvas.height=Math.round(h);
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);

  // Parse color to RGB
  const rgb=hexToRgb(color);

  // Base fill with slight paper texture
  ctx.fillStyle=color;
  ctx.fillRect(0,0,w,h);

  // Horizontal crayon strokes
  const strokeH=2.5;
  const numStrokes=Math.ceil(h/strokeH)+2;
  for(let s=0;s<numStrokes;s++){
    const y=s*strokeH;
    ctx.beginPath();
    let x=0;
    ctx.moveTo(x,y+(Math.random()-0.5)*1.2);
    while(x<w){
      x+=3+Math.random()*5;
      ctx.lineTo(x,y+(Math.random()-0.5)*1.5);
    }
    // Lighter stroke (wax sheen)
    const a=0.04+Math.random()*0.07;
    ctx.strokeStyle=`rgba(255,255,255,${a})`;
    ctx.lineWidth=strokeH*(0.5+Math.random()*0.6);
    ctx.stroke();
  }

  // Dark underlayer streaks
  for(let s=0;s<numStrokes*0.4;s++){
    const y=Math.random()*h;
    ctx.beginPath();
    ctx.moveTo(0,y);
    let x=0;
    while(x<w){x+=4+Math.random()*6;ctx.lineTo(x,y+(Math.random()-0.5));}
    ctx.strokeStyle=`rgba(0,0,0,${0.03+Math.random()*0.05})`;
    ctx.lineWidth=1+Math.random()*1.5;
    ctx.stroke();
  }

  // Fine grain
  const grainCount=Math.floor(w*h*0.025);
  for(let i=0;i<grainCount;i++){
    ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.08})`;
    ctx.fillRect(Math.random()*w,Math.random()*h,1,1);
  }
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

// ===== Stripe generation =====
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function isAlternating(arr){for(let i=1;i<arr.length;i++)if(arr[i]===arr[i-1])return false;return true;}
function canBeAlternated(arr){
  const counts={};arr.forEach(c=>{counts[c]=(counts[c]||0)+1;});
  const vals=Object.values(counts);
  if(vals.length===2)return Math.abs(vals[0]-vals[1])<=1;
  return Math.max(...vals)<=Math.ceil(arr.length/2);
}
function buildAlternating(colors,n){return Array.from({length:n},(_,i)=>colors[i%colors.length]);}

function permutations(arr){
  if(arr.length<=1)return[arr];
  const r=[];
  arr.forEach((v,i)=>{
    const rest=[...arr.slice(0,i),...arr.slice(i+1)];
    permutations(rest).forEach(p=>r.push([v,...p]));
  });
  return r;
}

function findBestAlternating(arr){
  const colors=[...new Set(arr)];
  let candidates=[];
  if(colors.length===2){
    const[a,b]=colors;
    const r1=[],r2=[];
    for(let i=0;i<arr.length;i++){r1.push(i%2===0?a:b);r2.push(i%2===0?b:a);}
    candidates=[r1,r2];
  }else{
    candidates=permutations(colors).map(p=>buildAlternating(p,arr.length));
  }
  let best=null,bestD=Infinity;
  candidates.forEach(c=>{
    let d=0;for(let i=0;i<arr.length;i++)if(arr[i]!==c[i])d++;
    if(d<bestD){bestD=d;best=c;}
  });
  return best||candidates[0];
}

function computeMinSwaps(arr){
  if(!canBeAlternated(arr))return Infinity;
  const best=findBestAlternating(arr);
  let diff=0;for(let i=0;i<arr.length;i++)if(arr[i]!==best[i])diff++;
  return Math.floor(diff/2);
}

function generateStripes(){
  const colors=selectedColors.map(x=>x.color);
  const n=totalStripes;
  canBeAlternating=Math.random()>0.4;
  let arr;
  if(canBeAlternating){
    arr=buildAlternating(colors,n);
    let tries=0;
    do{shuffle(arr);tries++;}while(isAlternating(arr)&&tries<60);
    minSwaps=computeMinSwaps(arr);
  }else{
    arr=[];
    const dominant=colors[0],rest=colors.slice(1);
    const dc=Math.ceil(n*0.65);
    for(let i=0;i<dc;i++)arr.push(dominant);
    for(let i=dc;i<n;i++)arr.push(rest[(i-dc)%rest.length]);
    shuffle(arr);
    minSwaps=0;
  }
  stripes=arr;initialStripes=[...arr];
  renderStripes();
}

// ===== Render stripes =====
// Attach listeners once via delegation to avoid duplicates on re-render
let stripeListenersAttached=false;

function renderStripes(){
  const container=document.getElementById('stripeContainer');
  container.innerHTML='';
  stripes.forEach((color,i)=>{
    const row=document.createElement('div');
    row.className='stripe';
    row.style.background=color;
    row.dataset.i=i;
    const cvs=document.createElement('canvas');
    row.appendChild(cvs);
    container.appendChild(row);
    requestAnimationFrame(()=>{
      const r=row.getBoundingClientRect();
      drawCrayonRect(cvs,color,r.width||440,r.height||50);
    });
  });

  if(!stripeListenersAttached){
    stripeListenersAttached=true;
    container.addEventListener('touchstart',e=>{
      const el=e.target.closest('.stripe');
      if(!el||el.classList.contains('is-placeholder'))return;
      e.preventDefault();
      dragIdx=parseInt(el.dataset.i);
      ghostColor=stripes[dragIdx];
      beginDrag(e.touches[0].clientX,e.touches[0].clientY,el);
    },{passive:false});
    container.addEventListener('touchmove',e=>{
      e.preventDefault();
      if(dragIdx===null)return;
      updateDrag(e.touches[0].clientX,e.touches[0].clientY);
    },{passive:false});
    container.addEventListener('touchend',e=>{
      if(dragIdx===null)return;
      finishDrag(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    });
    container.addEventListener('mousedown',e=>{
      const el=e.target.closest('.stripe');
      if(!el||el.classList.contains('is-placeholder'))return;
      dragIdx=parseInt(el.dataset.i);
      ghostColor=stripes[dragIdx];
      beginDrag(e.clientX,e.clientY,el);
      const mv=ev=>updateDrag(ev.clientX,ev.clientY);
      const up=ev=>{finishDrag(ev.clientX,ev.clientY);window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);};
      window.addEventListener('mousemove',mv);
      window.addEventListener('mouseup',up);
    });
  }
}

// ===== Drag =====
let dragIdx=null,ghostColor=null;

function getStripeEls(){return[...document.querySelectorAll('#stripeContainer .stripe')];}


function beginDrag(cx,cy,el){
  // Ghost
  const ghost=document.getElementById('dragGhost');
  ghost.style.background=ghostColor;
  ghost.style.display='block';
  const gcvs=document.getElementById('ghostCanvas');
  drawCrayonRect(gcvs,ghostColor,320,50);
  moveGhost(cx,cy);
  // Mark source
  el.classList.add('is-placeholder');
}

function moveGhost(cx,cy){
  const g=document.getElementById('dragGhost');
  g.style.left=(cx-160)+'px';
  g.style.top=(cy-25)+'px';
}

function updateDrag(cx,cy){
  moveGhost(cx,cy);
  getStripeEls().forEach(el=>el.classList.remove('drop-target'));
  const over=findStripeAt(cx,cy);
  if(over)over.classList.add('drop-target');
}

function findStripeAt(cx,cy){
  const els=getStripeEls();
  // Exact hit
  const exact=els.find(el=>{
    if(parseInt(el.dataset.i)===dragIdx)return false;
    const r=el.getBoundingClientRect();
    return cy>=r.top&&cy<=r.bottom&&cx>=r.left&&cx<=r.right;
  });
  if(exact)return exact;
  // Nearest by vertical center (handles gaps between stripes)
  let nearest=null,minDist=Infinity;
  els.forEach(el=>{
    if(parseInt(el.dataset.i)===dragIdx)return;
    const r=el.getBoundingClientRect();
    // Only consider if horizontally within bounds
    if(cx<r.left-10||cx>r.right+10)return;
    const centerY=(r.top+r.bottom)/2;
    const dist=Math.abs(cy-centerY);
    if(dist<minDist){minDist=dist;nearest=el;}
  });
  // Only snap if within 30px of the nearest stripe center
  return(minDist<30)?nearest:null;
}

function finishDrag(cx,cy){
  document.getElementById('dragGhost').style.display='none';
  getStripeEls().forEach(el=>el.classList.remove('drop-target','is-placeholder'));
  const fromIdx=dragIdx;
  dragIdx=null; // reset BEFORE renderStripes
  const over=findStripeAt(cx,cy);
  if(over){
    const ti=parseInt(over.dataset.i);
    [stripes[fromIdx],stripes[ti]]=[stripes[ti],stripes[fromIdx]];
    moves++;
    document.getElementById('movesLabel').textContent=t('movesLabel',moves);
  }
  renderStripes();
}

// ===== Answer =====
function submitAnswer(userSaysYes){
  const alt=isAlternating(stripes),solvable=canBeAlternating;
  let correct,resultKey;
  if(userSaysYes){correct=alt;resultKey=correct?'correctMaru':'wrongMaru';}
  else{correct=!solvable;resultKey=correct?'correctBatsu':'wrongBatsu';}
  lastCorrect=correct;
  showResult(resultKey,correct);
}

function showResult(key,correct){
  document.getElementById('resultTitle').textContent=t(key);
  let sub=key==='correctMaru'?t('correctMaruSub',moves):t(key+'Sub');
  document.getElementById('resultSub').textContent=sub;
  const mml=document.getElementById('minMovesLabel');
  mml.textContent=canBeAlternating?t('minMoves',minSwaps):'';
  document.getElementById('charSvg').innerHTML=correct?drawHappyChar():drawSadChar();
  const answerArr=canBeAlternating?findBestAlternating(initialStripes):[...initialStripes];
  renderPreviews(initialStripes,answerArr,stripes);
  document.getElementById('nextBtn').textContent=correct?t('nextStage'):t('retry');
  document.getElementById('overlay').classList.add('show');
}

function renderPreviews(init,answer,result){
  const row=document.getElementById('previewRow');
  row.innerHTML='';
  [{label:t('labelInit'),arr:init},{label:t('labelAnswer'),arr:answer},{label:t('labelResult'),arr:result}]
  .forEach(({label,arr})=>{
    const col=document.createElement('div');col.className='preview-col';
    const lbl=document.createElement('div');lbl.className='preview-label';lbl.textContent=label;col.appendChild(lbl);
    const box=document.createElement('div');box.className='preview-stripes';
    arr.forEach(color=>{
      const ps=document.createElement('div');ps.className='preview-stripe';ps.style.background=color;
      const cvs=document.createElement('canvas');ps.appendChild(cvs);box.appendChild(ps);
      requestAnimationFrame(()=>{
        const r=ps.getBoundingClientRect();
        drawCrayonRect(cvs,color,r.width||100,r.height||13);
      });
    });
    col.appendChild(box);row.appendChild(col);
  });
}

function nextStage(){if(lastCorrect)stage++;stripeListenersAttached=false;document.getElementById('overlay').classList.remove('show');init();}
